<body>
  <div id="root"></div>

  <script>
    const SUPABASE_URL = "https://mrnssxulfkacrrgsixnf.supabase.co";
    const SUPABASE_KEY = "sb_publishable_F0VmiKD01luzB61meBYqSQ_y98ofr0I";
    const TABLE = "products";
    const REST_URL = `${SUPABASE_URL}/rest/v1/${TABLE}`;
    const CATEGORIES = ["All", "Real Estate", "Vehicles", "Electronics", "Men", "Women", "Kids", "Shoes", "Jewelry", "Bags", "Home & Furniture", "Beauty", "Art & Paintings", "Books", "Handmade", "Services", "Other"];

    // 🔥 HOT SALES OF THE WEEK — HEAD BANNER 🔥
    // These images now come from Supabase (table "hero_banners", storage bucket "hero-banners"),
    // so you can upload them straight from the app instead of editing code. See setup steps
    // provided alongside this file for the one-time Supabase table + bucket creation.
    const HERO_TABLE = "hero_banners";
    const HERO_REST_URL = `${SUPABASE_URL}/rest/v1/${HERO_TABLE}`;
    const HERO_BUCKET = "hero-banners";
    const PRODUCT_BUCKET = "product-images";

    const APPLICATIONS_TABLE = "seller_applications";
    const APPLICATIONS_REST_URL = `${SUPABASE_URL}/rest/v1/${APPLICATIONS_TABLE}`;
    const ADMIN_WHATSAPP = "2347082795417";

    const AUTH_URL = `${SUPABASE_URL}/auth/v1/token?grant_type=password`;
    let authToken = null;

    let state = {
      products: null,
      loading: true,
      error: null,
      category: "All",
      query: "",
      heroBanners: null,
      heroUploading: false,
      heroError: null,
      showAdd: false,
      editMode: false,
      isAdmin: false,
      showPwModal: false,
      pwError: false,
      loggingIn: false,
      failedAttempts: 0,
      galleryProductId: null,
      showSellForm: false,
      sellSubmitting: false,
      sellSuccess: false,
      sellError: null,
      sellerApps: null,
      showApplications: false,
      paymentProductId: null,
    };

    function setState(patch) {
      state = { ...state, ...patch };
      render();
    }

    function getHeaders() {
      const h = {
        apikey: SUPABASE_KEY,
        "Content-Type": "application/json",
      };
      h.Authorization = authToken ? `Bearer ${authToken}` : `Bearer ${SUPABASE_KEY}`;
      return h;
    }

    async function loginAdmin(email, password) {
      const res = await fetch(AUTH_URL, {
        method: "POST",
        headers: { apikey: SUPABASE_KEY, "Content-Type": "application/json" },
        body: JSON.stringify({ email, password }),
      });
      if (!res.ok) throw new Error("Login failed");
      const data = await res.json();
      authToken = data.access_token;
      return true;
    }

    async function fetchProducts() {
      const res = await fetch(`${REST_URL}?select=*&order=id.desc`, { headers: getHeaders() });
      if (!res.ok) throw new Error("Failed to load");
      return res.json();
    }

    async function loadProducts() {
      setState({ loading: true });
      try {
        const data = await fetchProducts();
        setState({ products: data, loading: false, error: null });
      } catch (e) {
        setState({ products: [], loading: false, error: "Couldn't load deals right now. Check your connection and try again." });
      }
    }

    function sharpenImageData(imageData) {
      const { width, height, data } = imageData;
      const output = new Uint8ClampedArray(data.length);
      // Unsharp-style edge-enhance kernel
      const kernel = [0, -1, 0, -1, 5, -1, 0, -1, 0];
      for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
          for (let c = 0; c < 3; c++) {
            let sum = 0, k = 0;
            for (let ky = -1; ky <= 1; ky++) {
              for (let kx = -1; kx <= 1; kx++) {
                const yy = Math.min(height - 1, Math.max(0, y + ky));
                const xx = Math.min(width - 1, Math.max(0, x + kx));
                sum += data[(yy * width + xx) * 4 + c] * kernel[k];
                k++;
              }
            }
            output[(y * width + x) * 4 + c] = sum;
          }
          output[(y * width + x) * 4 + 3] = data[(y * width + x) * 4 + 3];
        }
      }
      return new ImageData(output, width, height);
    }

    async function sharpenAndResizeFile(file, maxDim = 1600) {
      return new Promise((resolve) => {
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = () => {
          URL.revokeObjectURL(url);
          let { width, height } = img;
          if (width > maxDim || height > maxDim) {
            const scale = maxDim / Math.max(width, height);
            width = Math.round(width * scale);
            height = Math.round(height * scale);
          }
          const canvas = document.createElement("canvas");
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0, width, height);
          try {
            const imageData = ctx.getImageData(0, 0, width, height);
            ctx.putImageData(sharpenImageData(imageData), 0, 0);
          } catch (e) {
            // if pixel access fails for any reason, fall back to the resized original
          }
          canvas.toBlob((blob) => {
            if (!blob) return resolve(file);
            resolve(new File([blob], file.name.replace(/\.\w+$/, "") + ".jpg", { type: "image/jpeg" }));
          }, "image/jpeg", 0.92);
        };
        img.onerror = () => resolve(file);
        img.src = url;
      });
    }

    async function uploadProductImages(files, onStatus) {
      const urls = [];
      for (let i = 0; i < files.length; i++) {
        onStatus(`Sharpening photo ${i + 1} of ${files.length}...`);
        const file = await sharpenAndResizeFile(files[i]);
        onStatus(`Uploading photo ${i + 1} of ${files.length}...`);
        const path = `${Date.now()}-${i}-${file.name.replace(/[^a-zA-Z0-9.\-_]/g, "")}`;
        const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/${PRODUCT_BUCKET}/${path}`, {
          method: "POST",
          headers: {
            apikey: SUPABASE_KEY,
            Authorization: `Bearer ${SUPABASE_KEY}`,
            "Content-Type": file.type || "image/jpeg",
          },
          body: file,
        });
        if (!uploadRes.ok) throw new Error("Upload failed for " + file.name);
        urls.push(`${SUPABASE_URL}/storage/v1/object/public/${PRODUCT_BUCKET}/${path}`);
      }
      return urls;
    }

    async function loadHeroBanners() {
      try {
        const res = await fetch(`${HERO_REST_URL}?select=*&order=created_at.desc`, { headers: getHeaders() });
        if (!res.ok) throw new Error("Failed to load banners");
        const data = await res.json();
        setState({ heroBanners: data });
      } catch (e) {
        setState({ heroBanners: [] });
      }
    }

    async function uploadHeroBanner(file) {
      setState({ heroUploading: true, heroError: null });
      try {
        file = await sharpenAndResizeFile(file, 1920);
        const path = `${Date.now()}-${file.name.replace(/[^a-zA-Z0-9.\-_]/g, "")}`;
        const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/${HERO_BUCKET}/${path}`, {
          method: "POST",
          headers: {
            apikey: SUPABASE_KEY,
            Authorization: authToken ? `Bearer ${authToken}` : `Bearer ${SUPABASE_KEY}`,
            "Content-Type": file.type || "image/jpeg",
          },
          body: file,
        });
        if (!uploadRes.ok) throw new Error("Upload failed");
        const publicUrl = `${SUPABASE_URL}/storage/v1/object/public/${HERO_BUCKET}/${path}`;
        const insertRes = await fetch(HERO_REST_URL, {
          method: "POST",
          headers: { ...getHeaders(), Prefer: "return=representation" },
          body: JSON.stringify({ image_url: publicUrl, storage_path: path, link: "" }),
        });
        if (!insertRes.ok) throw new Error("Save failed");
        await loadHeroBanners();
        setState({ heroUploading: false });
      } catch (e) {
        setState({ heroUploading: false, heroError: "Couldn't upload that image. Try again." });
      }
    }

    async function deleteHeroBanner(id) {
      const prev = state.heroBanners;
      const banner = (prev || []).find(h => String(h.id) === String(id));
      setState({ heroBanners: (prev || []).filter(h => String(h.id) !== String(id)) });
      try {
        const res = await fetch(`${HERO_REST_URL}?id=eq.${id}`, { method: "DELETE", headers: getHeaders() });
        if (!res.ok) throw new Error("delete failed");
        if (banner && banner.storage_path) {
          await fetch(`${SUPABASE_URL}/storage/v1/object/${HERO_BUCKET}`, {
            method: "DELETE",
            headers: getHeaders(),
            body: JSON.stringify({ prefixes: [banner.storage_path] }),
          });
        }
      } catch (e) {
        setState({ heroBanners: prev, heroError: "Couldn't remove that banner. Try again." });
      }
    }

    async function addProduct(product) {
      try {
        const res = await fetch(REST_URL, {
          method: "POST",
          headers: { ...getHeaders(), Prefer: "return=representation" },
          body: JSON.stringify(product),
        });
        if (!res.ok) {
          const bodyText = await res.text().catch(() => "");
          throw new Error(bodyText || "insert failed");
        }
        await loadProducts();
        return true;
      } catch (e) {
        setState({ error: "Couldn't post that deal — " + (e.message || "please check the fields and try again.") });
        return false;
      }
    }

    async function deleteProduct(id) {
      const prev = state.products;
      setState({ products: prev.filter(p => p.id !== id) });
      try {
        const res = await fetch(`${REST_URL}?id=eq.${id}`, { method: "DELETE", headers: getHeaders() });
        if (!res.ok) throw new Error("delete failed");
      } catch (e) {
        setState({ products: prev, error: "Couldn't remove that deal. Try again." });
      }
    }

    async function submitApplication(app) {
      setState({ sellSubmitting: true, sellError: null });
      try {
        const res = await fetch(APPLICATIONS_REST_URL, {
          method: "POST",
          headers: { apikey: SUPABASE_KEY, "Content-Type": "application/json", Authorization: `Bearer ${SUPABASE_KEY}` },
          body: JSON.stringify({ ...app, status: "pending" }),
        });
        if (!res.ok) throw new Error("apply failed");
        setState({ sellSubmitting: false, sellSuccess: true });
      } catch (e) {
        setState({ sellSubmitting: false, sellError: "Couldn't send your application. Please try again or reach us on WhatsApp." });
      }
    }

    async function loadApplications() {
      try {
        const res = await fetch(`${APPLICATIONS_REST_URL}?select=*&order=created_at.desc`, { headers: getHeaders() });
        if (!res.ok) throw new Error("failed");
        const data = await res.json();
        setState({ sellerApps: data });
      } catch (e) {
        setState({ sellerApps: [] });
      }
    }

    async function updateApplicationStatus(id, status) {
      const prev = state.sellerApps;
      setState({ sellerApps: (prev || []).map(a => String(a.id) === String(id) ? { ...a, status } : a) });
      try {
        const res = await fetch(`${APPLICATIONS_REST_URL}?id=eq.${id}`, {
          method: "PATCH",
          headers: getHeaders(),
          body: JSON.stringify({ status }),
        });
        if (!res.ok) throw new Error("update failed");
      } catch (e) {
        setState({ sellerApps: prev });
      }
    }

    function esc(str) {
      const div = document.createElement("div");
      div.textContent = str == null ? "" : str;

    let heroTimer = null;
    function startHeroAutoplay() {
      if (heroTimer) clearInterval(heroTimer);
      const track = document.getElementById("heroTrack");
      const count = (state.heroBanners || []).length;
      if (!track || count <= 1) return;
      let idx = 0;
      heroTimer = setInterval(() => {
        idx = (idx + 1) % count;
        track.scrollTo({ left: track.clientWidth * idx, behavior: "smooth" });
      }, 4000);
    }

    function attachEvents() {
      const searchInput = document.getElementById("searchInput");
      if (searchInput) {
        searchInput.addEventListener("input", (e) => {
          const pos = e.target.selectionStart;
          state.query = e.target.value;
          render();
          const el = document.getElementById("searchInput");
          if (el) { el.focus(); el.setSelectionRange(pos, pos); }
        });
      }

      const adminTrigger = document.getElementById("adminTrigger");
      if (adminTrigger) {
        adminTrigger.addEventListener("click", () => {
          if (state.isAdmin) {
            setState({ editMode: true });
          } else {
            setState({ showPwModal: true, pwError: false });
          }
        });
      }

      const toggleManage = document.getElementById("toggleManage");
      if (toggleManage) toggleManage.addEventListener("click", () => setState({ editMode: false }));

      const openAdd = document.getElementById("openAdd");
      if (openAdd) openAdd.addEventListener("click", () => setState({ showAdd: true, error: null }));

      const pwForm = document.getElementById("pwForm");
      if (pwForm) {
        pwForm.addEventListener("submit", async (e) => {
          e.preventDefault();
          if (state.failedAttempts >= 5) {
            setState({ pwError: true, lockedOut: true });
            return;
          }
          const email = document.getElementById("emailInput").value.trim();
          const password = document.getElementById("pwInput").value;
          setState({ loggingIn: true, pwError: false });
          try {
            await loginAdmin(email, password);
            setState({ isAdmin: true, showPwModal: false, pwError: false, editMode: true, loggingIn: false, failedAttempts: 0 });
            loadApplications();
          } catch (e) {
            setState({ pwError: true, loggingIn: false, failedAttempts: state.failedAttempts + 1 });
          }
        });
      }

      const pwOverlay = document.getElementById("pwOverlay");
      if (pwOverlay) {
        pwOverlay.addEventListener("click", (e) => {
          if (e.target.id === "pwOverlay") setState({ showPwModal: false, pwError: false });
        });
      }

      document.querySelectorAll("[data-cat]").forEach(btn => {
        btn.addEventListener("click", () => setState({ category: btn.getAttribute("data-cat") }));
      });

      document.querySelectorAll("[data-del]").forEach(btn => {
        btn.addEventListener("click", () => deleteProduct(btn.getAttribute("data-del")));
      });

      document.querySelectorAll("[data-hero-del]").forEach(btn => {
        btn.addEventListener("click", (e) => {
          e.preventDefault();
          e.stopPropagation();
          deleteHeroBanner(btn.getAttribute("data-hero-del"));
        });
      });

      const heroAddBtn = document.getElementById("heroAddBtn");
      const heroFileInput = document.getElementById("heroFileInput");
      if (heroAddBtn && heroFileInput) {
        heroAddBtn.addEventListener("click", () => heroFileInput.click());
        heroFileInput.addEventListener("change", (e) => {
          const file = e.target.files[0];
          if (file) uploadHeroBanner(file);
        });
      }

      document.querySelectorAll("[data-gallery]").forEach(el => {
        el.addEventListener("click", (e) => {
          if (e.target.closest(".del-btn")) return;
          setState({ galleryProductId: el.getAttribute("data-gallery") });
        });
      });

      const galleryClose = document.getElementById("galleryClose");
      if (galleryClose) galleryClose.addEventListener("click", () => setState({ galleryProductId: null }));

      const galleryOverlay = document.getElementById("galleryOverlay");
      if (galleryOverlay) {
        galleryOverlay.addEventListener("click", (e) => {
          if (e.target.id === "galleryOverlay") setState({ galleryProductId: null });
        });
      }

      const openSellForm = document.getElementById("openSellForm");
      if (openSellForm) openSellForm.addEventListener("click", () => setState({ showSellForm: true, sellSuccess: false, sellError: null }));

      const closeSellForm = document.getElementById("closeSellForm");
      if (closeSellForm) closeSellForm.addEventListener("click", () => setState({ showSellForm: false }));

      const sellOverlay = document.getElementById("sellOverlay");
      if (sellOverlay) {
        sellOverlay.addEventListener("click", (e) => {
          if (e.target.id === "sellOverlay") setState({ showSellForm: false });
        });
      }

      const sellForm = document.getElementById("sellForm");
      if (sellForm) {
        sellForm.addEventListener("submit", async (e) => {
          e.preventDefault();
          const full_name = document.getElementById("s-name").value.trim();
          const whatsapp = document.getElementById("s-whatsapp").value.trim();
          const email = document.getElementById("s-email").value.trim();
          const category = document.getElementById("s-category").value;
          const product_desc = document.getElementById("s-desc").value.trim();
          const sample_link = document.getElementById("s-link").value.trim();
          if (!full_name || !whatsapp || !product_desc) return;
          await submitApplication({ full_name, whatsapp, email, category, product_desc, sample_link });
        });
      }

      const openApplications = document.getElementById("openApplications");
      if (openApplications) {
        openApplications.addEventListener("click", async () => {
          setState({ showApplications: true });
          await loadApplications();
        });
      }

      const closeApplications = document.getElementById("closeApplications");
      if (closeApplications) closeApplications.addEventListener("click", () => setState({ showApplications: false }));

      const appsOverlay = document.getElementById("appsOverlay");
      if (appsOverlay) {
        appsOverlay.addEventListener("click", (e) => {
          if (e.target.id === "appsOverlay") setState({ showApplications: false });
        });
      }

      document.querySelectorAll("[data-app-approve]").forEach(btn => {
        btn.addEventListener("click", () => updateApplicationStatus(btn.getAttribute("data-app-approve"), "approved"));
      });
      document.querySelectorAll("[data-app-reject]").forEach(btn => {
        btn.addEventListener("click", () => updateApplicationStatus(btn.getAttribute("data-app-reject"), "rejected"));
      });

      document.querySelectorAll("[data-payment]").forEach(btn => {
        btn.addEventListener("click", () => setState({ paymentProductId: btn.getAttribute("data-payment") }));
      });

      const closePayment = document.getElementById("closePayment");
      if (closePayment) closePayment.addEventListener("click", () => setState({ paymentProductId: null }));

      const paymentOverlay = document.getElementById("paymentOverlay");
      if (paymentOverlay) {
        paymentOverlay.addEventListener("click", (e) => {
          if (e.target.id === "paymentOverlay") setState({ paymentProductId: null });
        });
      }

      const closeModal = document.getElementById("closeModal");
      if (closeModal) closeModal.addEventListener("click", () => setState({ showAdd: false }));

      const overlay = document.getElementById("modalOverlay");
      if (overlay) {
        overlay.addEventListener("click", (e) => {
          if (e.target.id === "modalOverlay") setState({ showAdd: false });
        });
      }

      const productFileInput = document.getElementById("f-image-file");
      if (productFileInput) {
        productFileInput.addEventListener("change", async (e) => {
          const files = Array.from(e.target.files || []);
          const statusEl = document.getElementById("f-image-status");
          const previewEl = document.getElementById("f-image-preview");
          const hiddenField = document.getElementById("f-image");
          if (files.length === 0) return;
          try {
            const urls = await uploadProductImages(files, (msg) => {
              if (statusEl) statusEl.textContent = msg;
            });
            hiddenField.value = urls.join(", ");
            if (previewEl) {
              previewEl.innerHTML = urls.map(u =>
                `<img src="${u}" style="width:56px; height:56px; object-fit:cover; border-radius:6px;" />`
              ).join("");
            }
            if (statusEl) statusEl.textContent = `${urls.length} photo${urls.length > 1 ? "s" : ""} ready.`;
          } catch (err) {
            if (statusEl) statusEl.textContent = "Upload failed. Try again.";
          }
        });
      }

      const addForm = document.getElementById("addForm");
      if (addForm) {
        addForm.addEventListener("submit", async (e) => {
          e.preventDefault();
          const name = document.getElementById("f-name").value.trim();
          const image = document.getElementById("f-image").value.trim();
          const category = document.getElementById("f-category").value;
          const price = document.getElementById("f-price").value.trim();
          const originalPrice = document.getElementById("f-original-price").value.trim();
          const description = document.getElementById("f-description").value.trim();
          const freeShipping = document.getElementById("f-free-shipping").checked;
          const deliveryTime = document.getElementById("f-delivery-time").value.trim();
          const note = document.getElementById("f-note").value.trim();
          const link = document.getElementById("f-link").value.trim();
          const sellerName = document.getElementById("f-seller-name").value.trim();
          const sellerContact = document.getElementById("f-seller-contact").value.trim();
          const isOwnProduct = document.getElementById("f-own-product").checked;
          const paymentInfo = document.getElementById("f-payment-info").value.trim();
          const statusEl = document.getElementById("f-image-status");
          const showFormError = (msg) => {
            if (statusEl) {
              statusEl.textContent = msg;
              statusEl.style.color = "#C0392B";
            }
          };
          if (statusEl) statusEl.style.color = "#8A8577";
          if (!image) {
            showFormError("Please add at least one photo before posting.");
            return;
          }
          if (!name) {
            showFormError("Please enter a product name.");
            return;
          }
          if (!price) {
            showFormError("Please enter a price.");
            return;
          }
          if (!isOwnProduct && !link) {
            showFormError("Please add a link, or check \"This is my own product\" if you don't have one.");
            return;
          }
          const submitBtn = document.getElementById("submitBtn");
          submitBtn.disabled = true;
          submitBtn.textContent = "Posting...";
          const ok = await addProduct({
            name, images: image, category, price, original_price: originalPrice, note, description,
            free_shipping: freeShipping, delivery_time: deliveryTime, link, spotted: "Just now",
            seller_name: sellerName || null, seller_contact: sellerContact || null,
            is_own_product: isOwnProduct, payment_info: paymentInfo || null,
          });
          if (ok) {
            setState({ showAdd: false });
          } else {
            submitBtn.disabled = false;
            submitBtn.textContent = "Post deal";
          }
        });
      }

      startHeroAutoplay();
    }

    loadProducts();
    loadHeroBanners();
  </script>
</body>
</html>
