<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fyndit — Best Gadget, Fashion & Beauty Deals in Nigeria</title>
<meta name="description" content="Fyndit is a hand-curated list of the best gadget, fashion, home, and beauty deals in Nigeria — spotted daily before they blow up." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#161616" />
<link rel="icon" type="image/png" href="/icon-192.png" />
<link rel="apple-touch-icon" href="/icon-192.png" />
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: 'Inter', system-ui, sans-serif; background: #F7F5F2; }
  ::selection { background: #FF5A3C; color: #161616; }
  input:focus, select:focus { border-color: #FF5A3C !important; }
  .btn { cursor: pointer; }
  .header { background: #161616; padding: 48px 20px 40px; position: relative; overflow: hidden; }
  .glow { position: absolute; top: -60px; right: -60px; width: 220px; height: 220px; border-radius: 50%; background: radial-gradient(circle, rgba(255,90,60,0.25) 0%, transparent 70%); }
  .pill { display: inline-flex; align-items: center; gap: 6px; background: #FF5A3C; color: #161616; font-size: 11px; font-weight: 800; padding: 5px 10px; border-radius: 999px; text-transform: uppercase; margin-bottom: 16px; }
  h1.brand { font-family: 'Archivo', sans-serif; font-weight: 900; font-size: clamp(32px, 7vw, 48px); color: #F7F5F2; margin: 0 0 12px; }
  .sub { font-size: 16px; color: #B8B4A8; max-width: 460px; margin: 0; }
  .controls { max-width: 720px; margin: 0 auto; padding: 24px 20px 0; }
  .search-row { display: flex; gap: 10px; margin-bottom: 16px; }
  .search-input { flex: 1; border: 1.5px solid #E3DDD0; border-radius: 12px; padding: 11px 14px; font-size: 14px; background: #FFFFFF; outline: none; }
  .add-btn { background: #161616; color: #F7F5F2; border: none; border-radius: 12px; padding: 11px 16px; font-family: 'Archivo', sans-serif; font-weight: 700; font-size: 13.5px; white-space: nowrap; }
  .cat-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
  .cat-scroll { display: flex; gap: 8px; overflow-x: auto; }
  .cat-btn { border-radius: 999px; padding: 7px 14px; font-size: 13px; font-weight: 700; white-space: nowrap; font-family: 'Archivo', sans-serif; border: 1.5px solid #D8D2C6; background: transparent; color: #161616; }
  .cat-btn.active { background: #FF5A3C; border: none; }
  .manage-btn { background: none; border: none; color: #8A8577; font-size: 12.5px; font-weight: 700; margin-left: 10px; }
  .manage-btn.active { color: #FF5A3C; }
  main.grid-main { max-width: 720px; margin: 0 auto; padding: 0 20px 60px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
  .card { background: #EDE8E0; border-radius: 16px; padding: 18px; position: relative; display: flex; flex-direction: column; gap: 10px; border: 1px solid #E3DDD0; }
  .card-img { width: 100%; height: 140px; object-fit: cover; border-radius: 10px; margin-bottom: 2px; }
  .del-btn { position: absolute; top: 12px; right: 12px; background: #161616; color: #F7F5F2; border: none; border-radius: 8px; width: 30px; height: 30px; }
  .tag { display: inline-flex; align-items: center; gap: 5px; align-self: flex-start; background: #161616; color: #F7F5F2; font-size: 10.5px; font-weight: 700; padding: 5px 9px; border-radius: 999px; text-transform: uppercase; }
  .card h3 { font-family: 'Archivo', sans-serif; font-weight: 800; font-size: 18px; color: #161616; margin: 0; }
  .card p.note { font-size: 13.5px; color: #5C6178; margin: 0; }
  .price-row { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; }
  .price { font-family: 'Archivo', sans-serif; font-weight: 800; font-size: 20px; color: #161616; }
  .deal-link { display: inline-flex; align-items: center; gap: 6px; background: #FF5A3C; color: #161616; font-family: 'Archivo', sans-serif; font-weight: 800; font-size: 13px; text-decoration: none; padding: 9px 14px; border-radius: 10px; }
  .empty { text-align: center; padding: 60px 20px; color: #8A8577; background: #EDE8E0; border-radius: 16px; }
  .err { background: #FFE8E0; border: 1px solid #FF5A3C; color: #7A2E1D; font-size: 13px; padding: 10px 14px; border-radius: 10px; margin-bottom: 16px; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(22,22,22,0.72); display: flex; align-items: flex-end; justify-content: center; z-index: 50; }
  .modal { background: #F7F5F2; width: 100%; max-width: 520px; border-radius: 20px 20px 0 0; padding: 28px 24px 32px; max-height: 88vh; overflow-y: auto; }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; }
  .modal-header h2 { font-family: 'Archivo', sans-serif; font-weight: 800; font-size: 22px; color: #161616; margin: 0; }
  .close-btn { background: none; border: none; font-size: 20px; color: #161616; padding: 6px; }
  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  .field label { font-size: 12px; font-weight: 700; color: #5C6178; text-transform: uppercase; letter-spacing: 0.04em; }
  .field input, .field select { border: 1.5px solid #E3DDD0; border-radius: 10px; padding: 12px 14px; font-size: 15px; color: #161616; background: #FFFFFF; outline: none; font-family: 'Inter', sans-serif; }
  .submit-btn { width: 100%; margin-top: 8px; background: #FF5A3C; color: #161616; border: none; border-radius: 12px; padding: 14px 0; font-family: 'Archivo', sans-serif; font-weight: 800; font-size: 15px; }
  .submit-btn:disabled { background: #D8D2C6; color: #8A8577; }
  .footer { max-width: 720px; margin: 0 auto; padding: 20px 20px 40px; text-align: center; }
  .footer-contact { display: flex; justify-content: center; align-items: center; gap: 10px; font-size: 13px; }
  .footer-contact a { color: #5C6178; text-decoration: none; font-weight: 600; }
  .footer-contact .dot { color: #D8D2C6; }
  .footer-admin { margin-top: 14px; color: #D8D2C6; font-size: 13px; display: inline-block; padding: 6px 14px; }
  .pw-modal { background: #F7F5F2; width: 100%; max-width: 360px; border-radius: 20px; padding: 24px; }
  .pw-modal h3 { font-family: 'Archivo', sans-serif; font-weight: 800; font-size: 17px; color: #161616; margin: 0 0 14px; }
  .pw-modal input { width: 100%; border: 1.5px solid #E3DDD0; border-radius: 10px; padding: 12px 14px; font-size: 15px; outline: none; margin-bottom: 10px; }
  .pw-modal .pw-err { color: #FF5A3C; font-size: 12.5px; margin-bottom: 10px; }
  .pw-modal .pw-btn { width: 100%; background: #161616; color: #F7F5F2; border: none; border-radius: 10px; padding: 12px 0; font-family: 'Archivo', sans-serif; font-weight: 700; font-size: 14px; }
</style>
</head>
<body>
  <div id="root"></div>

  <script>
    const SUPABASE_URL = "https://mrnssxulfkacrrgsixnf.supabase.co";
    const SUPABASE_KEY = "sb_publishable_F0VmiKD01luzB61meBYqSQ_y98ofr0I";
    const TABLE = "products";
    const REST_URL = `${SUPABASE_URL}/rest/v1/${TABLE}`;
    const CATEGORIES = ["All", "Gadgets", "Fashion", "Home", "Beauty"];

    const AUTH_URL = `${SUPABASE_URL}/auth/v1/token?grant_type=password`;
    let authToken = null;

    let state = {
      products: null,
      loading: true,
      error: null,
      category: "All",
      query: "",
      showAdd: false,
      editMode: false,
      isAdmin: false,
      showPwModal: false,
      pwError: false,
      loggingIn: false,
    };

    function setState(patch) {
      state = { ...state, ...patch };
      render();
    }

    function getHeaders() {
      const h = {
        apikey: SUPABASE_KEY,
        "Content-Type": "application/json",
      };
      h.Authorization = authToken ? `Bearer ${authToken}` : `Bearer ${SUPABASE_KEY}`;
      return h;
    }

    async function loginAdmin(email, password) {
      const res = await fetch(AUTH_URL, {
        method: "POST",
        headers: { apikey: SUPABASE_KEY, "Content-Type": "application/json" },
        body: JSON.stringify({ email, password }),
      });
      if (!res.ok) throw new Error("Login failed");
      const data = await res.json();
      authToken = data.access_token;
      return true;
    }

    async function fetchProducts() {
      const res = await fetch(`${REST_URL}?select=*&order=id.desc`, { headers: getHeaders() });
      if (!res.ok) throw new Error("Failed to load");
      return res.json();
    }

    async function loadProducts() {
      setState({ loading: true });
      try {
        const data = await fetchProducts();
        setState({ products: data, loading: false, error: null });
      } catch (e) {
        setState({ products: [], loading: false, error: "Couldn't load deals right now. Check your connection and try again." });
      }
    }

    async function addProduct(product) {
      try {
        const res = await fetch(REST_URL, {
          method: "POST",
          headers: { ...getHeaders(), Prefer: "return=representation" },
          body: JSON.stringify(product),
        });
        if (!res.ok) throw new Error("insert failed");
        await loadProducts();
      } catch (e) {
        setState({ error: "Couldn't post that deal. Try again." });
      }
    }

    async function deleteProduct(id) {
      const prev = state.products;
      setState({ products: prev.filter(p => p.id !== id) });
      try {
        const res = await fetch(`${REST_URL}?id=eq.${id}`, { method: "DELETE", headers: getHeaders() });
        if (!res.ok) throw new Error("delete failed");
      } catch (e) {
        setState({ products: prev, error: "Couldn't remove that deal. Try again." });
      }
    }

    function esc(str) {
      const div = document.createElement("div");
      div.textContent = str == null ? "" : str;
      return div.innerHTML;
    }

    function renderCard(p) {
      return `
        <div class="card" data-id="${p.id}">
          ${state.editMode ? `<button class="del-btn" data-del="${p.id}">✕</button>` : ""}
          ${p.image ? `<img src="${esc(p.image)}" alt="${esc(p.name)}" class="card-img" loading="lazy" onerror="this.style.display='none'" />` : ""}
          <div class="tag">Spotted ${esc(p.spotted)}</div>
          <h3 style="${state.editMode ? "padding-right:30px" : ""}">${esc(p.name)}</h3>
          ${p.note ? `<p class="note">${esc(p.note)}</p>` : ""}
          <div class="price-row">
            <span class="price">${esc(p.price)}</span>
            <a class="deal-link" href="${esc(p.link)}" target="_blank" rel="noopener noreferrer">Get deal →</a>
          </div>
        </div>
      `;
    }

    function renderModal() {
      if (!state.showAdd) return "";
      return `
        <div class="modal-overlay" id="modalOverlay">
          <div class="modal" id="modalBox">
            <div class="modal-header">
              <h2>Flag a new deal</h2>
              <button class="close-btn" id="closeModal">✕</button>
            </div>
            <form id="addForm">
              <div class="field">
                <label>Product name</label>
                <input id="f-name" placeholder="e.g. Wireless Earbuds Pro" required />
              </div>
              <div class="field">
                <label>Image URL (optional)</label>
                <input id="f-image" type="url" placeholder="https://i.postimg.cc/..." />
              </div>
              <div class="field">
                <label>Category</label>
                <select id="f-category">
                  ${CATEGORIES.filter(c => c !== "All").map(c => `<option value="${c}">${c}</option>`).join("")}
                </select>
              </div>
              <div class="field">
                <label>Price</label>
                <input id="f-price" placeholder="e.g. ₦8,500" required />
              </div>
              <div class="field">
                <label>Your note (make it searchable)</label>
                <input id="f-note" placeholder="e.g. Best earbuds under ₦10k" />
              </div>
              <div class="field">
                <label>Affiliate link</label>
                <input id="f-link" type="url" placeholder="https://..." required />
              </div>
              <button type="submit" class="submit-btn" id="submitBtn">Post deal</button>
            </form>
          </div>
        </div>
      `;
    }

    function renderPasswordModal() {
      if (!state.showPwModal) return "";
      return `
        <div class="modal-overlay" id="pwOverlay">
          <div class="pw-modal" id="pwModalBox">
            <h3>Admin login</h3>
            <form id="pwForm">
              <input type="email" id="emailInput" placeholder="Email" autocomplete="off" value="miracleobodo34@gmail.com" />
              <input type="password" id="pwInput" placeholder="Password" autocomplete="off" />
              ${state.pwError ? `<div class="pw-err">Incorrect email or password. Try again.</div>` : ""}
              <button type="submit" class="pw-btn" ${state.loggingIn ? "disabled" : ""}>${state.loggingIn ? "Logging in..." : "Log in"}</button>
            </form>
          </div>
        </div>
      `;
    }

    function render() {
      const filtered = (state.products || []).filter(p => {
        const matchCat = state.category === "All" || p.category === state.category;
        const q = state.query.toLowerCase();
        const matchQuery = !q || p.name.toLowerCase().includes(q) || (p.note || "").toLowerCase().includes(q);
        return matchCat && matchQuery;
      });

      const catButtons = CATEGORIES.map(c =>
        `<button class="cat-btn ${state.category === c ? "active" : ""}" data-cat="${c}">${c}</button>`
      ).join("");

      let gridHtml;
      if (state.loading) {
        gridHtml = `<div style="text-align:center;padding:60px 0;color:#8A8577;">Loading deals...</div>`;
      } else if (filtered.length === 0) {
        gridHtml = `<div class="empty">${
          state.products && state.products.length === 0
            ? "No deals posted yet. Tap Add to flag your first one."
            : "Nothing matches that search right now."
        }</div>`;
      } else {
        gridHtml = `<div class="grid">${filtered.map(renderCard).join("")}</div>`;
      }

      document.getElementById("root").innerHTML = `
        <div>
          <header class="header">
            <div class="glow"></div>
            <div style="max-width:720px;margin:0 auto;position:relative;">
              <div class="pill">Curated daily</div>
              <h1 class="brand">Fyndit</h1>
              <p class="sub">Deals I've personally hunted down across gadgets, fashion, home, and beauty — before they blow up.</p>
            </div>
          </header>

          <div class="controls">
            ${state.error ? `<div class="err">${esc(state.error)}</div>` : ""}
            <div class="search-row">
              <input class="search-input" id="searchInput" placeholder="Search deals..." value="${esc(state.query)}" />
            </div>
            <div class="cat-row">
              <div class="cat-scroll">${catButtons}</div>
              ${state.editMode ? `<button class="add-btn btn" id="openAdd" style="margin-left:8px;">+ Add</button><button class="manage-btn active" id="toggleManage" style="margin-left:8px;">Done</button>` : ""}
            </div>
          </div>

          <main class="grid-main">${gridHtml}</main>

          <footer class="footer">
            <div class="footer-contact">
              <a href="https://wa.me/2347082795417" target="_blank" rel="noopener noreferrer">WhatsApp</a>
              <span class="dot">·</span>
              <a href="mailto:miracleobodo34@gmail.com">Email</a>
              <span class="dot">·</span>
              <a href="https://instagram.com/Kings.graphic8" target="_blank" rel="noopener noreferrer">Instagram</a>
            </div>
            <div class="footer-admin" id="adminTrigger">·</div>
          </footer>
        </div>
        ${renderModal()}
        ${renderPasswordModal()}
      `;

      attachEvents();
    }

    function attachEvents() {
      const searchInput = document.getElementById("searchInput");
      if (searchInput) {
        searchInput.addEventListener("input", (e) => {
          const pos = e.target.selectionStart;
          state.query = e.target.value;
          render();
          const el = document.getElementById("searchInput");
          if (el) { el.focus(); el.setSelectionRange(pos, pos); }
        });
      }

      const adminTrigger = document.getElementById("adminTrigger");
      if (adminTrigger) {
        adminTrigger.addEventListener("click", () => {
          if (state.isAdmin) {
            setState({ editMode: true });
          } else {
            setState({ showPwModal: true, pwError: false });
          }
        });
      }

      const toggleManage = document.getElementById("toggleManage");
      if (toggleManage) toggleManage.addEventListener("click", () => setState({ editMode: false }));

      const openAdd = document.getElementById("openAdd");
      if (openAdd) openAdd.addEventListener("click", () => setState({ showAdd: true }));

      const pwForm = document.getElementById("pwForm");
      if (pwForm) {
        pwForm.addEventListener("submit", async (e) => {
          e.preventDefault();
          const email = document.getElementById("emailInput").value.trim();
          const password = document.getElementById("pwInput").value;
          setState({ loggingIn: true, pwError: false });
          try {
            await loginAdmin(email, password);
            setState({ isAdmin: true, showPwModal: false, pwError: false, editMode: true, loggingIn: false });
          } catch (e) {
            setState({ pwError: true, loggingIn: false });
          }
        });
      }

      const pwOverlay = document.getElementById("pwOverlay");
      if (pwOverlay) {
        pwOverlay.addEventListener("click", (e) => {
          if (e.target.id === "pwOverlay") setState({ showPwModal: false, pwError: false });
        });
      }

      document.querySelectorAll("[data-cat]").forEach(btn => {
        btn.addEventListener("click", () => setState({ category: btn.getAttribute("data-cat") }));
      });

      document.querySelectorAll("[data-del]").forEach(btn => {
        btn.addEventListener("click", () => deleteProduct(btn.getAttribute("data-del")));
      });

      const closeModal = document.getElementById("closeModal");
      if (closeModal) closeModal.addEventListener("click", () => setState({ showAdd: false }));

      const overlay = document.getElementById("modalOverlay");
      if (overlay) {
        overlay.addEventListener("click", (e) => {
          if (e.target.id === "modalOverlay") setState({ showAdd: false });
        });
      }

      const addForm = document.getElementById("addForm");
      if (addForm) {
        addForm.addEventListener("submit", async (e) => {
          e.preventDefault();
          const name = document.getElementById("f-name").value.trim();
          const image = document.getElementById("f-image").value.trim();
          const category = document.getElementById("f-category").value;
          const price = document.getElementById("f-price").value.trim();
          const note = document.getElementById("f-note").value.trim();
          const link = document.getElementById("f-link").value.trim();
          if (!name || !price || !link) return;
          const submitBtn = document.getElementById("submitBtn");
          submitBtn.disabled = true;
          submitBtn.textContent = "Posting...";
          await addProduct({ name, image, category, price, note, link, spotted: "Just now" });
          setState({ showAdd: false });
        });
      }
    }

    loadProducts();
  </script>
</body>
</html>
